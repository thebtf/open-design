name: Publish repository template assets

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Git commit SHA that still contains assets/prompt-templates/video/* binaries
        required: true
        type: string
      asset_basename:
        description: Asset basename (e.g. video-seedance-desk-hologram-ar-realdesk)
        required: true
        type: string
permissions:
  contents: read

jobs:
  publish:
    name: Publish prompt-template preview assets to repository-assets R2
    if: github.repository == 'nexu-io/open-design'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract preview assets from git history
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          ASSET_BASENAME: ${{ inputs.asset_basename }}
        run: |
          set -euo pipefail
          video_path="assets/prompt-templates/video/${ASSET_BASENAME}.mp4"
          poster_path="assets/prompt-templates/video/${ASSET_BASENAME}-poster.jpg"
          git show "${SOURCE_COMMIT}:${video_path}" > /tmp/template-preview.mp4
          git show "${SOURCE_COMMIT}:${poster_path}" > /tmp/template-preview-poster.jpg
          ls -la /tmp/template-preview.mp4 /tmp/template-preview-poster.jpg

      - name: Publish to repository-assets R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_REPOSITORY_ASSETS_AK }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_REPOSITORY_ASSETS_SK }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
          CLOUDFLARE_R2_REPOSITORY_ASSETS_BUCKET: ${{ secrets.CLOUDFLARE_R2_REPOSITORY_ASSETS_BUCKET }}
          CLOUDFLARE_R2_REPOSITORY_ASSETS_PUBLIC_ORIGIN: ${{ vars.CLOUDFLARE_R2_REPOSITORY_ASSETS_PUBLIC_ORIGIN }}
          CLOUDFLARE_R2_REPOSITORY_ASSETS_URL: ${{ secrets.CLOUDFLARE_R2_REPOSITORY_ASSETS_URL }}
          ASSET_BASENAME: ${{ inputs.asset_basename }}
        shell: bash
        run: |
          set -euo pipefail
          endpoint="${CLOUDFLARE_R2_REPOSITORY_ASSETS_URL%/}"
          bucket="$CLOUDFLARE_R2_REPOSITORY_ASSETS_BUCKET"
          public_origin="${CLOUDFLARE_R2_REPOSITORY_ASSETS_PUBLIC_ORIGIN%/}"
          video_key="resources/videos/prompt-templates/${ASSET_BASENAME}.mp4"
          poster_key="resources/images/prompt-templates/${ASSET_BASENAME}-poster.jpg"
          aws --endpoint-url "$endpoint" s3api put-object \
            --bucket "$bucket" \
            --key "$video_key" \
            --body /tmp/template-preview.mp4 \
            --content-type "video/mp4" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-cli-pager
          aws --endpoint-url "$endpoint" s3api put-object \
            --bucket "$bucket" \
            --key "$poster_key" \
            --body /tmp/template-preview-poster.jpg \
            --content-type "image/jpeg" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-cli-pager
          echo "Published ${public_origin}/${video_key}"
          echo "Published ${public_origin}/${poster_key}"

      - name: Verify public URLs
        env:
          PUBLIC_ORIGIN: ${{ vars.CLOUDFLARE_R2_REPOSITORY_ASSETS_PUBLIC_ORIGIN }}
          ASSET_BASENAME: ${{ inputs.asset_basename }}
        shell: bash
        run: |
          set -euo pipefail
          origin="${PUBLIC_ORIGIN%/}"
          for url in \
            "${origin}/resources/videos/prompt-templates/${ASSET_BASENAME}.mp4" \
            "${origin}/resources/images/prompt-templates/${ASSET_BASENAME}-poster.jpg"
          do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$url")"
            echo "$url -> HTTP $code"
            if [ "$code" != "200" ]; then
              echo "Expected HTTP 200 after publish" >&2
              exit 1
            fi
          done
